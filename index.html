<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Nova Luta</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="styles-index.css" />
  </head>

  <body>
    <div class="left-panel">
      <img src="wolf.png" alt="Logo Lobo" />
    </div>

    <div class="right-panel">
      <div class="upper-container">
        <div class="form-new-fight">
          <span class="config-title">CONFIGURAR LUTA</span>

          <form id="form">
            <div class="name-toggle">
              <input type="checkbox" id="preencher-nomes" />
              <label for="preencher-nomes">Preencher nomes dos lutadores</label>
            </div>

            <div id="name-fields" style="display: none">
              <label class="fighter blue">LUTADOR 1</label>
              <input id="lut1" />

              <label class="fighter red">LUTADOR 2</label>
              <input id="lut2" />
            </div>

            <label>TEMPO</label>
            <select id="tempo">
              <option value="150" selected>2:30</option>
              <option value="180">3:00</option>
              <option value="240">4:00</option>
              <option value="300">5:00</option>
              <option value="360">6:00</option>
              <option value="420">7:00</option>
              <option value="480">8:00</option>
              <option value="600">10:00</option>
            </select>

            <button type="submit">Começar</button>
          </form>
        </div>
      </div>
    </div>

    <script>
      document.getElementById("preencher-nomes").addEventListener("change", function () {
        document.getElementById("name-fields").style.display = this.checked ? "contents" : "none";
      });

      document.getElementById("form").addEventListener("submit", (e) => {
        e.preventDefault();
        const fillNames = document.getElementById("preencher-nomes").checked;
        const lut1 = document.getElementById("lut1");
        const lut2 = document.getElementById("lut2");
        localStorage.setItem(
          "fightConfig",
          JSON.stringify({
            lut1: fillNames && lut1.value.trim() ? lut1.value.trim() : "Lutador 1",
            lut2: fillNames && lut2.value.trim() ? lut2.value.trim() : "Lutador 2",
            tempo: parseInt(document.getElementById("tempo").value),
          }),
        );
        document.documentElement.requestFullscreen()
          .catch(() => {})
          .finally(() => { window.location.href = "fight.html"; });
      });
    </script>
  </body>
</html>
